<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Expert TotalEnergies - Gemini IA</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eef2; margin: 0; padding: 15px; font-size: 12px; color: #3a4a5c; }
        .wrapper { display: grid; grid-template-columns: 0.9fr 2.4fr 0.9fr; gap: 15px; height: 95vh; max-width: 1600px; margin: 0 auto; }
        .column { background: #ffffff; border-radius: 8px; display: flex; flex-direction: column; padding: 15px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #dce4e8; }
        h2 { font-size: 0.9em; color: #5a6e7c; margin-top: 0; border-bottom: 1px solid #e2e8ec; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        label { font-weight: 500; display: block; margin: 8px 0 3px 0; color: #5a6e7c; font-size: 0.85em; }
        
        textarea { width: 100%; border: 1px solid #d0d8de; border-radius: 6px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; background: #ffffff; font-size: 12px; transition: border 0.2s; }
        textarea:focus { outline: none; border-color: #8aa0ae; box-shadow: 0 0 0 2px rgba(100,120,130,0.1); }
        
        select { width: 100%; padding: 8px; border: 1px solid #d0d8de; border-radius: 6px; background: #fff; margin-bottom: 10px; cursor: pointer; font-size: 12px; color: #3a4a5c; }
        
        #historique, #demande { height: 100px; }
        #instructions { flex-grow: 1; min-height: 120px; }
        #reponse_client { flex-grow: 1; font-size: 18px; line-height: 1.5; background: #f5f7f9; border-color: #cbd8e0; min-height: 200px; font-family: 'Segoe UI', Arial, sans-serif; }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 500; transition: all 0.2s; margin-top: 8px; width: 100%; font-size: 0.85em; text-align: center; }
        .btn-primary { background: #6c8e9e; color: white; }
        .btn-primary:hover { background: #5a7c8c; }
        .btn-success { background: #7c9a6e; color: white; }
        .btn-success:hover { background: #6a885c; }
        .btn-secondary { background: #9aaeb8; color: white; }
        .btn-secondary:hover { background: #889ca6; }
        .btn-vider { background: #e2e8ec; color: #6a7e8c; border: 1px solid #cbd8e0; }
        .btn-vider:hover { background: #d0dce4; color: #5a6e7c; }
        .btn-config { background: #8aa0ae; color: white; }
        .btn-config:hover { background: #788e9c; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-group .btn { margin-top: 0; }
        
        .status-bar { background: #ecf1f4; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 11px; color: #5a6e7c; border-left: 3px solid #8aa0ae; }
        .status-error { border-left-color: #c97d6e; background: #fef5f3; color: #b45a4a; }
        .status-success { border-left-color: #7c9a6e; background: #f0f6ec; color: #4a6a3a; }
        .status-warning { border-left-color: #d9b48b; background: #fef8f0; color: #b87a3a; }
        
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #d0d8de; border-top: 2px solid #6c8e9e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .config-panel { display: none; background: #ecf1f4; border-radius: 6px; padding: 12px; margin-top: 10px; border: 1px solid #d0d8de; }
        .config-panel.show { display: block; }
        .config-panel input { width: calc(100% - 16px); padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: #fff; }
        .model-select { width: 100%; padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: white; }
        .info-text { font-size: 11px; color: #7a8e9c; margin-top: 5px; text-align: center; }
        .test-btn { background: #d9b48b; color: white; margin-top: 5px; padding: 6px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .test-btn:hover { background: #c9a47b; }
        .model-badge { font-size: 10px; color: #b8860b; margin-left: 5px; font-weight: normal; }
        
        .spacer { height: 10px; }
        .heure-info { font-size: 10px; color: #8aa0ae; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="wrapper">
    
    <div class="column">
        <h2>📋 Préparation</h2>
        
        <label>📱 Canal de traitement</label>
        <select id="canal_choix" onchange="majStructureReponse()">
            <option value="AM">📱 Application Mobile</option>

        <label>📜 Historique complet</label>

        <label>✉️ Demande à traiter</label>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="genererAvecGemini()">✨ GÉNÉRER AVEC GEMINI</button>

        <button class="btn btn-secondary" onclick="reinitialiserStructure()">🔄 RÉINITIALISER LA STRUCTURE</button>

    </div>

    <div class="column">
        <h2>📊 Suivi & BASE</h2>
        <button class="btn btn-vider" onclick="toutVider()">🗑️ VIDER TOUT</button>

        <label>📌 BASE</label>
        <textarea id="base_area" style="flex-grow: 1; min-height: 150px; font-family: monospace; font-size: 12px;" placeholder="B :&#10;A :&#10;S :&#10;E :"></textarea>

        <div class="spacer"></div>
        <button class="btn btn-primary" onclick="preparerEtCopierHisto()">📝 PRÉPARER ET COPIER HISTORISATION</button>
        
        <div class="spacer"></div>
        <button class="btn btn-config" onclick="toggleConfigPanel()">⚙️ CONFIGURATION API</button>
        
        <div id="configPanel" class="config-panel">
            <strong>🔑 Configuration API Gemini</strong>
            <input type="password" id="api_key" placeholder="Votre clé API Gemini" autocomplete="off">
            <label style="margin-top: 8px;">🤖 Modèle Gemini <span class="model-badge">✨ NOUVEAUTÉS GEMINI 3</span></label>
            <select id="model_select" class="model-select">
                <optgroup label="🌟 Gemini 3 - Dernière génération (2026)">
                    <option value="gemini-3-pro-preview">🚀 Gemini 3 Pro (Preview) - Le plus puissant</option>
                    <option value="gemini-3-flash-preview">⚡ Gemini 3 Flash (Preview) - Rapide et efficace</option>
                    <option value="gemini-3-flash-lite-preview">💨 Gemini 3 Flash Lite (Preview) - Léger et économique</option>
                </optgroup>
                <optgroup label="📌 Gemini 2.5 - Stable">
                    <option value="gemini-2.5-flash">✨ Gemini 2.5 Flash (stable)</option>
                    <option value="gemini-2.0-flash">⚡ Gemini 2.0 Flash</option>
                    <option value="gemini-2.0-flash-lite">💨 Gemini 2.0 Flash Lite</option>
                </optgroup>
            </select>
            <button class="test-btn" onclick="testerCleApi()">🔍 Tester la clé API</button>
            <button class="test-btn" onclick="verifierModelesDisponibles()" style="background: #6c8e9e;">📋 Vérifier les modèles disponibles</button>
            <div class="info-text">Obtenez une clé sur <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> (gratuite)</div>
            <div class="info-text" style="color: #b8860b; margin-top: 8px;">💡 <strong>Astuce :</strong> Pour Gemini 3, assurez-vous d'avoir activé les preview models</div>
        </div>
    </div>

</div>

<script>
    let isGenerating = false;
    
    const PROMPT_BASE = `Demande du client :




EXPERT RELATION CLIENT TOTALENERGIES
ÉTAPE 1 : ANALYSE PSYCHOLOGIQUE ET CONTEXTUELLE (INTERNE)
Avant de rédiger, analysez silencieusement le message du client :

Sentiment : (Neutre / Agacé / Très Mécontent / Urgent).

Effort Client : Le client a-t-il déjà fait des démarches ou envoyé des pièces ? (Oui/Non).

Posture : - Si Agacé : Empathie immédiate et validation de la frustration.

Si Effort fourni : Valorisation immédiate de sa proactivité ("Je vous félicite pour...", "Je vous remercie pour votre réactivité...").

L'ÉTAPE 1 doit être réalisée sous forme de réflexion interne. Ne rédigez pas cette analyse dans la réponse finale, utilisez-la uniquement pour orienter le ton et la structure de votre message.

ÉTAPE 2 : DIRECTIVES DE RÉDACTION (STRICTES)

1. Identité et Posture :

Persona : Conseiller expert du service client TotalEnergies.

Ton : Chaleureux, rassurant et pédagogue.

Fusion d'accueil : La première phrase doit fusionner l'accueil et la prise en charge, adaptée à l'émotion ou à la situation. Variez les formulations pour éviter toute répétition automatique.

2. Articulation et Fluidité :

Rédaction naturelle, sans exagération des connecteurs logiques.

Séparez chaque idée par un paragraphe distinct.

Utilisez le "je" pour vos actions et le "nous" pour représenter TotalEnergies.

3. Règles de Construction Stricte :

Format : Texte simple (e-mail), sans listes à puces ni tirets (sauf section BASE).

Syntaxes : Mode déclaratif. Utilisez des formes de courtoisie ("Je vous invite à", "Je vous prie de").

Chiffres et Unités : Nombres en chiffres (ex: 2 jours, 150 €). Unités obligatoires : €, kWh, kVA.

Format des Dates : "jour mois année" avec le mois en lettres (ex : 5 mars 2026). Interdiction des barres obliques (/).

Temps : Futur simple pour les actions à venir ("Je ferai").

Rubriques Espace Client : Respecter strictement la mise en page : "Nom de la rubrique > Sous-rubrique". N'inventez aucune rubrique. Si aucune n'est fournie, ne proposez pas de chemin.

Pièces jointes / Liens : Ne supprimez jamais les liens fournis dans les instructions de réponse.

Identité Client : NOM, PRÉNOM, ADRESSE en MAJUSCULES. Civilité : Seule l'initiale est au majuscule (Madame/Monsieur).

Majuscules Systématiques : Les noms des services internes doivent porter une majuscule sur chaque initiale (ex: Service Technique, Service Déménagement, Service Paiement).

4. Lexique et Ponctuation :

Mots à bannir : problème, malheureusement, recommander, engager, engagement, meilleurs délais, impatience, co-titulaire.

Respecter : ENEDIS, gestionnaire du réseau d'électricité ; GRDF, gestionnaire du réseau de gaz ; Heures Pleines / Heures Creuses ; chèque énergie.

Régle de ponctuation pour la rénumération : Virgule (,) en fin de ligne si la pensée est incomplète, point (.) si la phrase est complète. La dernière ligne finit toujours par un point.

5. Annuaire des Contacts :

Service Paiement : 09 70 80 65 45 (lun - sam, 9h - 19h).

Service Technique / Clientèle : 09 70 80 69 69 (lun - sam, 9h - 19h).

Agence de Services et de Paiements (ASP) : 08 05 20 48 05.

Service Commercial : 30 99 (8h - 20h).

Engagement Satisfaction Client et Pédagogie :

Valorisation et Allié du Client : Adoptez une posture de partenaire conseil. Si une demande n'est pas recevable, ne vous contentez pas d'un refus ; expliquez le "pourquoi" pédagogiquement et basculez immédiatement sur une solution alternative ou un conseil utile (méthode du pivot positif).

Transparence et Clarté : Évitez le jargon technique. Expliquez les calculs ou les règles de gestion de manière simple pour que le client comprenne la situation, ce qui réduit la frustration même en cas de désaccord.

Preuve d'Étude du Dossier : Pour montrer que la demande a été traitée avec soin, citez systématiquement des éléments précis (montant exact TTC, numéro de facture, dates ou index de consommation....).

IMPORTANT : 
- Pour le canal EMAIL : Génère UNIQUEMENT l'OBJET et le CORPS du message. L'objet doit être concis et précis. Le corps est le contenu principal du message.
- Pour le canal AM (Application Mobile) : Génère UNIQUEMENT le CORPS du message.
- Ne génère PAS les salutations, formules de politesse, signature, BP, ni "Mme,". Ces éléments seront ajoutés automatiquement par l'interface.

Pour chaque réponse, il faut générer le BASE à la fin, séparé par "***".

Si j'ai mentionné da la réonse que la demande est transmise à un autre service, fournissez un commentaire explicatif pour ce service avant la section BASE. Pour qu'il puisse comprends le traitement qu'on attend d'eux.

Séparateur ()*.

Section BASE (Format Stricte) :

B : Résumé de la demande en une phrase simple ("Le client demande/souhaite").

A : Informations factuelles constatées sur le dossier (ligne vide si aucune).

S : Résumé de la solution apportée ("J'ai informé/fait/proposé/expliqué").

E : Actions possibles sur l'Espace Client ou anticipations indiquées (Indiquer n/a si rien).`;
    
    // Fonction pour extraire la date et l'heure de la demande
    function extraireDateHeureDemande(texteDemande) {
        // Recherche des patterns de date comme: 31/03/26 13:28 ou 31/03/2026 13:28
        const datePattern = /(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+(\d{1,2})[:h](\d{2})/i;
        const match = texteDemande.match(datePattern);
        
        if (match) {
            let jour = match[1].padStart(2, '0');
            let mois = match[2].padStart(2, '0');
            let annee = match[3];
            let heure = match[4].padStart(2, '0');
            let minute = match[5];
            
            // Conversion de l'année si elle est sur 2 chiffres
            if (annee.length === 2) {
                annee = '20' + annee;
            }
            
            const moisNoms = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            const moisIndex = parseInt(mois, 10) - 1;
            const moisNom = moisNoms[moisIndex];
            
            return {
                date: `${parseInt(jour, 10)} ${moisNom} ${annee}`,
                heure: `${heure}:${minute}`,
                found: true
            };
        }
        return { found: false };
    }
    
    // Fonction pour obtenir le moment de la journée selon les créneaux horaires
    function getMomentDeLaJournee() {
        const now = new Date();
        const heures = now.getHours();
        const minutes = now.getMinutes();
        const heureMinute = heures + minutes / 60;
        
        // 2h00 à 11h59 -> excellente journée
        if (heureMinute >= 2 && heureMinute < 12) {
            return "une excellente journée";
        }
        // 12h00 à 16h59 -> excellent après-midi
        else if (heureMinute >= 12 && heureMinute < 17) {
            return "un excellent après-midi";
        }
        // 17h00 à 1h59 -> excellente soirée
        else {
            return "une excellente soirée";
        }
    }
    
    function getStructureComplete() {
        const canal = document.getElementById('canal_choix').value;
        const momentPhrase = getMomentDeLaJournee();
        
        if (canal === "EMAIL") {
            return {
                entete: `BP : \n\nMme ,\n\n`,
                corps: "",
                signature: `\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer ${momentPhrase}.\n\nCordialement,`
            };
        } else {
            const now = new Date();
            const heures = now.getHours();
            const minutes = now.getMinutes();
            const heureMinute = heures + minutes / 60;
            let salutation = "Bonjour";
            if (heureMinute >= 17 || heureMinute < 2) {
                salutation = "Bonsoir";
            } else if (heureMinute >= 2 && heureMinute < 12) {
                salutation = "Bonjour";
            } else if (heureMinute >= 12 && heureMinute < 17) {
                salutation = "Bonjour";
            }
            
            return {
                entete: `${salutation} Monsieur,\n\n`,
                corps: "",
                signature: `\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer ${momentPhrase}.\n\nCordialement,\n\nSolofonirina`
            };
        }
    }
    
    function majStructureReponse() {
        const reponseArea = document.getElementById('reponse_client');
        const currentContent = reponseArea.value;
        const canal = document.getElementById('canal_choix').value;
        const structure = getStructureComplete();
        
        if (canal === "EMAIL") {
            const hasEmailStructure = currentContent.includes('Objet :') && currentContent.includes('BP :');
            if (!hasEmailStructure || !currentContent.trim()) {
                reponseArea.value = structure.entete + structure.signature;
            }
        } else {
            const hasMobileStructure = (currentContent.includes('Bonjour') || currentContent.includes('Bonsoir'));
            if (!hasMobileStructure || !currentContent.trim()) {
                reponseArea.value = structure.entete + structure.signature;
            }
        }
        updateMomentInfo();
    }
    
    function updateMomentInfo() {
        const moment = getMomentDeLaJournee();
        const infoDiv = document.getElementById('momentInfo');
        if (infoDiv) {
            const now = new Date();
            const heures = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            let plage = "";
            if (heures >= 2 && heures <= 11) plage = "2h-11h59";
            else if (heures >= 12 && heures <= 16) plage = "12h-16h59";
            else plage = "17h-1h59";
            infoDiv.innerHTML = `🕐 ${moment.toUpperCase()} (${plage} - ${heures}:${minutes})`;
        }
    }
    
    function reinitialiserStructure() {
        const structure = getStructureComplete();
        document.getElementById('reponse_client').value = structure.entete + structure.signature;
        showStatus("✅ Structure réinitialisée", "success");
    }
    
    function toggleConfigPanel() {
        const panel = document.getElementById('configPanel');
        panel.classList.toggle('show');
    }
    
    async function testerCleApi() {
        const apiKey = document.getElementById('api_key').value.trim();
        if (!apiKey) {
            showStatus("❌ Veuillez entrer une clé API d'abord", "error");
            return;
        }
        
        showStatus("<span class='loading'></span> Test de la clé API...", "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
            const data = await response.json();
            
            if (response.ok) {
                const modelCount = data.models?.length || 0;
                showStatus(`✅ Clé valide ! ${modelCount} modèles disponibles.`, "success");
            } else {
                showStatus(`❌ Clé invalide: ${data.error?.message || 'Erreur inconnue'}`, "error");
            }
        } catch (error) {
            showStatus(`❌ Erreur: ${error.message}`, "error");
        }
    }
    
    async function verifierModelesDisponibles() {
        const apiKey = document.getElementById('api_key').value.trim();
        if (!apiKey) {
            showStatus("❌ Veuillez entrer une clé API d'abord", "error");
            return;
        }
        
        showStatus("<span class='loading'></span> Récupération des modèles disponibles...", "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
            const data = await response.json();
            
            if (response.ok && data.models) {
                const modelsList = data.models.map(m => m.name.replace('models/', '')).join(', ');
                const gemini3Models = data.models.filter(m => m.name.includes('gemini-3')).length;
                const gemini25Models = data.models.filter(m => m.name.includes('gemini-2.5')).length;
                
                showStatus(`📋 Modèles: ${gemini3Models} Gemini 3, ${gemini25Models} Gemini 2.5. Liste: ${modelsList.substring(0, 150)}...`, "success");
            } else {
                showStatus(`❌ Erreur: ${data.error?.message || 'Erreur'}`, "error");
            }
        } catch (error) {
            showStatus(`❌ Erreur: ${error.message}`, "error");
        }
    }
    
    function showStatus(message, type = "info") {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = message;
        statusDiv.className = `status-bar status-${type}`;
        setTimeout(() => {
            if (document.getElementById('statusMessage').innerHTML === message) {
                statusDiv.className = "status-bar";
            }
        }, 6000);
    }
    
    function construirePromptComplet() {
        const hist = document.getElementById('historique').value.trim();
        const dem = document.getElementById('demande').value.trim();
        const inst = document.getElementById('instructions').value.trim();
        const canal = document.getElementById('canal_choix').value;
        
        if (!dem) {
            throw new Error("Veuillez saisir une demande client à traiter.");
        }
        
        let instructionCanal = "";
        if (canal === "EMAIL") {
            instructionCanal = `\n\nINSTRUCTION CANAL EMAIL : Génère d'abord l'OBJET sur une ligne, puis le CORPS du message. Sépare l'objet du corps par un saut de ligne. Format attendu :
Objet: [votre objet ici]

[corps du message]`;
        } else {
            instructionCanal = `\n\nINSTRUCTION CANAL APPLICATION MOBILE : Génère uniquement le CORPS du message (sans salutation, ni signature).`;
        }
        
        return `${PROMPT_BASE}\n\n****************************\nHISTORIQUE :\n${hist || "Aucun historique"}\n\nDEMANDE CLIENT :\n${dem}\n\nINSTRUCTIONS COMPLÉMENTAIRES :\n${inst || "Aucune instruction spécifique"}${instructionCanal}\n\n************************************\nGénère maintenant la réponse selon les instructions du canal, suivie de "***" et du BASE.`;
    }
    
    async function genererAvecGemini() {
        const apiKey = document.getElementById('api_key').value.trim();
        const model = document.getElementById('model_select').value;
        const canal = document.getElementById('canal_choix').value;
        
        if (!apiKey) {
            showStatus("❌ Veuillez configurer votre clé API", "error");
            return;
        }
        
        if (isGenerating) {
            showStatus("⏳ Génération en cours...", "info");
            return;
        }
        
        let prompt;
        try {
            prompt = construirePromptComplet();
        } catch (error) {
            showStatus(`❌ ${error.message}`, "error");
            return;
        }
        
        isGenerating = true;
        const modelDisplay = model.includes('gemini-3') ? 'Gemini 3' : 'Gemini 2.5';
        showStatus(`<span class='loading'></span> Génération avec ${modelDisplay} (${model})...`, "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 4096,
                        topP: 0.95
                    }
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                let errorMsg = errorData.error?.message || `Erreur ${response.status}`;
                
                if (errorMsg.includes('not found') && model.includes('gemini-3')) {
                    errorMsg = `Le modèle ${model} n'est pas encore disponible sur votre compte. Utilisez un modèle Gemini 2.5 (stable) en attendant.`;
                }
                throw new Error(errorMsg);
            }
            
            const data = await response.json();
            let generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (!generatedText) {
                throw new Error("Réponse vide de l'API");
            }
            
            let objet = "";
            let corpsMessage = "";
            let baseContent = "";
            
            if (canal === "EMAIL") {
                const objetMatch = generatedText.match(/Objet\s*:\s*(.+?)(?:\n|$)/i);
                if (objetMatch) {
                    objet = objetMatch[1].trim();
                    let tempText = generatedText.replace(/Objet\s*:\s*.+?(?:\n|$)/i, '');
                    if (tempText.includes('***')) {
                        const parts = tempText.split('***');
                        corpsMessage = parts[0].trim();
                        baseContent = parts[1].trim();
                    } else {
                        const baseMatch = tempText.match(/(B\s*:[\s\S]*)/i);
                        if (baseMatch) {
                            const baseIndex = tempText.indexOf(baseMatch[0]);
                            corpsMessage = tempText.substring(0, baseIndex).trim();
                            baseContent = baseMatch[0].trim();
                        } else {
                            corpsMessage = tempText.trim();
                            baseContent = "B : \n\nA : \n\nS : \n\nE : n/a";
                        }
                    }
                } else {
                    corpsMessage = generatedText.trim();
                    baseContent = "B : \n\nA : \n\nS : \n\nE : n/a";
                }
            } else {
                if (generatedText.includes('***')) {
                    const parts = generatedText.split('***');
                    corpsMessage = parts[0].trim();
                    baseContent = parts[1].trim();
                } else {
                    const baseMatch = generatedText.match(/(B\s*:[\s\S]*)/i);
                    if (baseMatch) {
                        const baseIndex = generatedText.indexOf(baseMatch[0]);
                        corpsMessage = generatedText.substring(0, baseIndex).trim();
                        baseContent = baseMatch[0].trim();
                    } else {
                        corpsMessage = generatedText.trim();
                        baseContent = "B : \n\nA : \n\nS : \n\nE : n/a";
                    }
                }
            }
            
            const structure = getStructureComplete();
            let reponseComplete;
            
            if (canal === "EMAIL") {
                if (objet) {
                    reponseComplete = `Objet : ${objet}\n\nBP : \n\nMme ,\n\n${corpsMessage}${structure.signature}`;
                } else {
                    reponseComplete = structure.entete + corpsMessage + structure.signature;
                }
            } else {
                reponseComplete = structure.entete + corpsMessage + structure.signature;
            }
            
            document.getElementById('reponse_client').value = reponseComplete;
            document.getElementById('base_area').value = baseContent || "B : \n\nA : \n\nS : \n\nE : n/a";
            
            showStatus(`✅ Génération réussie avec ${modelDisplay} !`, "success");
            
        } catch (error) {
            console.error('Erreur:', error);
            showStatus(`❌ Erreur: ${error.message}`, "error");
        } finally {
            isGenerating = false;
        }
    }
    
    function copierPromptComplet() {
        try {
            const prompt = construirePromptComplet();
            copyToClipboard(prompt);
            showStatus("📋 Prompt copié !", "success");
        } catch (error) {
            showStatus(`❌ ${error.message}`, "error");
        }
    }
    
    function preparerEtCopierHisto() {
        const d = document.getElementById('demande').value;
        const r = document.getElementById('reponse_client').value;
        const b = document.getElementById('base_area').value;
        const canal = document.getElementById('canal_choix').value;
        
        if (!d && !r) {
            showStatus("❌ Aucune donnée à historiser", "error");
            return;
        }
        
        // Extraire la date et l'heure de la demande
        const dateHeureExtraite = extraireDateHeureDemande(d);
        
        let datePosteFormatee;
        let heureDemande;
        
        if (dateHeureExtraite.found) {
            // Utiliser la date et l'heure extraites de la demande
            datePosteFormatee = dateHeureExtraite.date;
            heureDemande = dateHeureExtraite.heure;
        } else {
            // Utiliser la date et l'heure du poste
            const now = new Date();
            const moisNoms = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            datePosteFormatee = `${now.getDate()} ${moisNoms[now.getMonth()]} ${now.getFullYear()}`;
            
            // Rechercher une heure dans la demande
            const heureMatch = d.match(/([01]?[0-9]|2[0-3])[:h][0-5][0-9]/i);
            heureDemande = heureMatch ? heureMatch[0].replace('h', ':') : "--:--";
        }
        
        const labelEntete = (canal === "EMAIL") ? `Mail Odigo du ${datePosteFormatee} à ${heureDemande}` : `AM du ${datePosteFormatee} à ${heureDemande}`;
        
        const bloc = `${b || "B : \n\nA : \n\nS : \n\nE : "}\n\n***************************\n\n${labelEntete}\n\nRequête client :\n${d || "(non renseignée)"}\n\nRéponse apportée :\n\n${r || "(non renseignée)"}`;
        
        copyToClipboard(bloc);
        showStatus("📋 Historisation copiée !", "success");
    }
    
    function copierTexte(id) {
        const element = document.getElementById(id);
        if (!element.value.trim()) {
            showStatus(`⚠️ Champ vide`, "warning");
            return;
        }
        copyToClipboard(element.value);
        showStatus(`📋 Copié !`, "success");
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).catch(() => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    }
    
    function toutVider() {
        if(confirm("Effacer tous les champs ?")) {
            ['historique', 'demande', 'instructions', 'base_area', 'reponse_client'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = "";
            });
            reinitialiserStructure();
            showStatus("✅ Tout a été vidé", "success");
        }
    }
    
    function sauvegarderCleApi() {
        const apiKey = document.getElementById('api_key').value;
        if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
    }
    
    function sauvegarderModele() {
        const model = document.getElementById('model_select').value;
        localStorage.setItem('gemini_model', model);
    }
    
    function sauvegarderCanal() {
        const canal = document.getElementById('canal_choix').value;
        localStorage.setItem('canal_choix', canal);
    }
    
    function chargerDonnees() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api_key').value = savedKey;
        const savedModel = localStorage.getItem('gemini_model');
        if (savedModel) document.getElementById('model_select').value = savedModel;
        const savedCanal = localStorage.getItem('canal_choix');
        if (savedCanal) document.getElementById('canal_choix').value = savedCanal;
    }
    
    // Mettre à jour l'info toutes les minutes
    setInterval(updateMomentInfo, 60000);
    
    document.addEventListener('DOMContentLoaded', () => {
        chargerDonnees();
        majStructureReponse();
        updateMomentInfo();
        
        document.getElementById('api_key').addEventListener('change', sauvegarderCleApi);
        document.getElementById('api_key').addEventListener('blur', sauvegarderCleApi);
        document.getElementById('model_select').addEventListener('change', sauvegarderModele);
        document.getElementById('canal_choix').addEventListener('change', sauvegarderCanal);
        
        ['historique', 'demande', 'instructions'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    genererAvecGemini();
                }
            });
        });
        
        showStatus("✅ Prêt ! Modèles Gemini 3 disponibles. Sélectionnez-les dans la configuration API.", "success");
    });
</script>
