<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Expert TotalEnergies - Gemini IA</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eef2; margin: 0; padding: 15px; font-size: 12px; color: #3a4a5c; }
        .wrapper { display: grid; grid-template-columns: 0.9fr 2.4fr 0.9fr; gap: 15px; height: 95vh; max-width: 1600px; margin: 0 auto; }
        .column { background: #ffffff; border-radius: 8px; display: flex; flex-direction: column; padding: 15px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #dce4e8; }
        h2 { font-size: 0.9em; color: #5a6e7c; margin-top: 0; border-bottom: 1px solid #e2e8ec; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        label { font-weight: 500; display: block; margin: 8px 0 3px 0; color: #5a6e7c; font-size: 0.85em; }
        
        textarea { width: 100%; border: 1px solid #d0d8de; border-radius: 6px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; background: #ffffff; font-size: 12px; transition: border 0.2s; }
        textarea:focus { outline: none; border-color: #8aa0ae; box-shadow: 0 0 0 2px rgba(100,120,130,0.1); }
        
        select { width: 100%; padding: 8px; border: 1px solid #d0d8de; border-radius: 6px; background: #fff; margin-bottom: 10px; cursor: pointer; font-size: 12px; color: #3a4a5c; }
        
        #historique, #demande { height: 100px; }
        #instructions { flex-grow: 1; min-height: 120px; }
        #reponse_client { flex-grow: 1; font-size: 18px; line-height: 1.5; background: #f5f7f9; border-color: #cbd8e0; min-height: 200px; }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 500; transition: all 0.2s; margin-top: 8px; width: 100%; font-size: 0.85em; text-align: center; }
        .btn-primary { background: #6c8e9e; color: white; }
        .btn-primary:hover { background: #5a7c8c; }
        .btn-success { background: #7c9a6e; color: white; }
        .btn-success:hover { background: #6a885c; }
        .btn-secondary { background: #9aaeb8; color: white; }
        .btn-secondary:hover { background: #889ca6; }
        .btn-vider { background: #e2e8ec; color: #6a7e8c; border: 1px solid #cbd8e0; }
        .btn-vider:hover { background: #d0dce4; color: #5a6e7c; }
        .btn-config { background: #8aa0ae; color: white; }
        .btn-config:hover { background: #788e9c; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-group .btn { margin-top: 0; }
        
        .status-bar { background: #ecf1f4; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 11px; color: #5a6e7c; border-left: 3px solid #8aa0ae; }
        .status-error { border-left-color: #c97d6e; background: #fef5f3; color: #b45a4a; }
        .status-success { border-left-color: #7c9a6e; background: #f0f6ec; color: #4a6a3a; }
        .status-warning { border-left-color: #d9b48b; background: #fef8f0; color: #b87a3a; }
        
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #d0d8de; border-top: 2px solid #6c8e9e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .config-panel { display: none; background: #ecf1f4; border-radius: 6px; padding: 12px; margin-top: 10px; border: 1px solid #d0d8de; }
        .config-panel.show { display: block; }
        .config-panel input { width: calc(100% - 16px); padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: #fff; }
        .model-select { width: 100%; padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: white; }
        .info-text { font-size: 11px; color: #7a8e9c; margin-top: 5px; text-align: center; }
        .test-btn { background: #d9b48b; color: white; margin-top: 5px; padding: 6px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .test-btn:hover { background: #c9a47b; }
        
        .spacer { height: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    
    <div class="column">
        <h2>📋 Préparation</h2>
        
        <label>📱 Canal de traitement</label>
        <select id="canal_choix" onchange="majSignature()">
            <option value="AM">📱 Application Mobile</option>
            <option value="EMAIL">✉️ E-mail</option>
        </select>

        <label>📜 Historique complet</label>
        <textarea id="historique" spellcheck="false" placeholder="Laisser vide si aucun historique..."></textarea>
        
        <label>✉️ Demande à traiter</label>
        <textarea id="demande" spellcheck="false" placeholder="Message client avec l'heure..."></textarea>
        
        <label>⚙️ Instructions spécifiques</label>
        <textarea id="instructions" spellcheck="false" placeholder="Instructions complémentaires (optionnel)..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="genererAvecGemini()">✨ GÉNÉRER AVEC GEMINI</button>
            <button class="btn btn-secondary" onclick="copierPromptComplet()">📋 COPIER LE PROMPT</button>
        </div>
        <div id="statusMessage" class="status-bar">✅ Prêt. Cliquez sur "⚙️ CONFIGURATION API" ci-dessous pour configurer Gemini</div>
    </div>

    <div class="column">
        <h2>✍️ Traitement de la réponse</h2>
        <label>Rédaction (Police 18px)</label>
        <textarea id="reponse_client" spellcheck="true"></textarea>
        
        <button class="btn btn-success" onclick="copierTexte('reponse_client')">📋 COPIER LA RÉPONSE CLIENT</button>
    </div>

    <div class="column">
        <h2>📊 Suivi & BASE</h2>
        <button class="btn btn-vider" onclick="toutVider()">🗑️ VIDER TOUT</button>

        <label>📌 BASE</label>
        <textarea id="base_area" style="flex-grow: 1; min-height: 150px; font-family: monospace; font-size: 12px;" placeholder="B :&#10;A :&#10;S :&#10;E :"></textarea>

        <div class="spacer"></div>
        <button class="btn btn-primary" onclick="preparerEtCopierHisto()">📝 PRÉPARER ET COPIER HISTORISATION</button>
        
        <div class="spacer"></div>
        <button class="btn btn-config" onclick="toggleConfigPanel()">⚙️ CONFIGURATION API</button>
        
        <div id="configPanel" class="config-panel">
            <strong>🔑 Configuration API Gemini</strong>
            <input type="password" id="api_key" placeholder="Votre clé API Gemini" autocomplete="off">
            <label style="margin-top: 8px;">🤖 Modèle Gemini</label>
            <select id="model_select" class="model-select">
                <option value="gemini-2.5-flash">✨ Gemini 2.5 Flash (rapide - recommandé)</option>
                <option value="gemini-2.0-flash">⚡ Gemini 2.0 Flash</option>
                <option value="gemini-2.0-flash-lite">💨 Gemini 2.0 Flash Lite (léger)</option>
            </select>
            <button class="test-btn" onclick="testerCleApi()">🔍 Tester la clé API</button>
            <div class="info-text">Obtenez une clé sur <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> (gratuite)</div>
        </div>
    </div>

</div>

<script>
    let isGenerating = false;
    
    function toggleConfigPanel() {
        const panel = document.getElementById('configPanel');
        panel.classList.toggle('show');
    }
    
    async function testerCleApi() {
        const apiKey = document.getElementById('api_key').value.trim();
        if (!apiKey) {
            showStatus("❌ Veuillez entrer une clé API d'abord", "error");
            return;
        }
        
        showStatus("<span class='loading'></span> Test de la clé API...", "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
            const data = await response.json();
            
            if (response.ok) {
                const models = data.models || [];
                const modelNames = models.map(m => m.name.replace('models/', '')).join(', ');
                showStatus(`✅ Clé valide ! Modèles disponibles : ${modelNames.substring(0, 150)}...`, "success");
            } else {
                showStatus(`❌ Clé invalide: ${data.error?.message || 'Erreur inconnue'}`, "error");
            }
        } catch (error) {
            showStatus(`❌ Erreur: ${error.message}`, "error");
        }
    }
    
    function getSignatureByCanalAndHour() {
        const canal = document.getElementById('canal_choix').value;
        const now = new Date();
        const heure = now.getHours();
        const estApresMidi = (heure >= 2 && heure < 17);
        const momentTexte = estApresMidi ? "un excellent après-midi" : "une excellente soirée";
        
        if (canal === "EMAIL") {
            return `Objet : \n\nBP : \n\nMme ,\n\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer ${momentTexte}.\n\nCordialement,`;
        } else {
            const salutation = estApresMidi ? "Bonjour Monsieur," : "Bonsoir Monsieur,";
            return `${salutation}\n\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer ${momentTexte}.\n\nCordialement,\n\nSolofonirina`;
        }
    }
    
    function majSignature() {
        const reponseArea = document.getElementById('reponse_client');
        if (!reponseArea.value.trim() || reponseArea.value.includes("Bonjour") || reponseArea.value.includes("Bonsoir") || reponseArea.value.includes("Objet")) {
            reponseArea.value = getSignatureByCanalAndHour();
        }
    }
    
    function showStatus(message, type = "info") {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = message;
        statusDiv.className = `status-bar status-${type}`;
        setTimeout(() => {
            if (document.getElementById('statusMessage').innerHTML === message) {
                statusDiv.className = "status-bar";
            }
        }, 5000);
    }
    
    function construirePromptComplet() {
        const hist = document.getElementById('historique').value.trim();
        const dem = document.getElementById('demande').value.trim();
        const inst = document.getElementById('instructions').value.trim();
        const canal = document.getElementById('canal_choix').value;
        
        if (!dem) {
            throw new Error("Veuillez saisir une demande client à traiter.");
        }
        
        const formatSpecifique = canal === "EMAIL" ? 
            "Format E-mail avec objet et BP" : 
            "Format Application Mobile avec salutation et signature Solofonirina";
        
        return `Tu es un expert relation client TotalEnergies. Rédige une réponse professionnelle et une section BASE au format strict.

CANAL DE RÉPONSE : ${canal === "EMAIL" ? "E-MAIL" : "APPLICATION MOBILE"}
${formatSpecifique}

DEMANDE CLIENT À TRAITER :
${dem}

${hist ? `HISTORIQUE :\n${hist}\n` : ""}
${inst ? `INSTRUCTIONS SPÉCIFIQUES :\n${inst}\n` : ""}

## RÈGLES DE RÉDACTION :

1. Ton : chaleureux, rassurant, pédagogue
2. Utilise "je" pour tes actions, "nous" pour TotalEnergies
3. Nombres en chiffres (ex: 2 jours, 150 €)
4. Unités : €, kWh, kVA
5. Dates au format "jour mois année" (ex: 5 mars 2026) - INTERDICTION des barres obliques (/)
6. Mots interdits : problème, malheureusement, recommander, engager, engagement, meilleurs délais, impatience, co-titulaire
7. Noms et prénoms clients en MAJUSCULES
8. Services internes : majuscule sur chaque initiale (Service Technique, Service Déménagement...)
9. Respecter : ENEDIS, gestionnaire du réseau d'électricité ; GRDF, gestionnaire du réseau de gaz ; Heures Pleines / Heures Creuses ; chèque énergie

## CONTACTS OFFICIELS :
- Service Paiement : 09 70 80 65 45 (lundi-samedi 9h-19h)
- ASP : 08 05 20 48 05
- Service Technique/Clientèle : 09 70 80 69 69
- Service Commercial : 30 99 (tous les jours 8h-20h)

## FORMAT DE RÉPONSE EXIGÉ :

${canal === "EMAIL" ? 
`Objet : [objet court]

BP : [texte du message]

Mme [Prénom du client en MAJUSCULES],

[Corps de la réponse avec paragraphes séparés]

Je reste à votre disposition pour toute information complémentaire et vous souhaite de passer [un excellent après-midi/une excellente soirée].

Cordialement,` : 
`[Bonjour/Bonsoir] Monsieur [Prénom du client en MAJUSCULES],

[Corps de la réponse avec paragraphes séparés]

Je reste à votre disposition pour toute information complémentaire et vous souhaite de passer [un excellent après-midi/une excellente soirée].

Cordialement,

Solofonirina`}

***

B : [résumé de la demande en une phrase - "le client demande/souhaite"]

A : [informations factuelles constatées sur le dossier - laisser vide si aucune]

S : [résumé de la solution - "j'ai informé/fait/proposé/expliqué"]

E : [actions sur Espace Client/Application Mobile ou anticipations - n/a si aucun]

## IMPORTANT : 
- La signature et les salutations (Bonjour/Bonsoir, après-midi/soirée) sont déjà gérées automatiquement par l'heure. Tu dois adapter le moment de la journée dans la formule de politesse.
- Pour l'Application Mobile : Utilise "Bonjour" de 2h à 17h, "Bonsoir" de 17h à 2h
- Pour l'Application Mobile : Utilise "un excellent après-midi" de 2h à 17h, "une excellente soirée" de 17h à 2h
- Pour l'E-mail : Pas de "Bonjour/Bonsoir" dans la signature, mais "BP :" avant le message

Génère maintenant la réponse complète et la BASE selon ce format exact.`;
    }
    
    async function genererAvecGemini() {
        const apiKey = document.getElementById('api_key').value.trim();
        const model = document.getElementById('model_select').value;
        
        if (!apiKey) {
            showStatus("❌ Veuillez configurer votre clé API (bouton ⚙️ CONFIGURATION API)", "error");
            return;
        }
        
        if (isGenerating) {
            showStatus("⏳ Génération en cours...", "info");
            return;
        }
        
        let prompt;
        try {
            prompt = construirePromptComplet();
        } catch (error) {
            showStatus(`❌ ${error.message}`, "error");
            return;
        }
        
        isGenerating = true;
        showStatus(`<span class="loading"></span> Génération avec ${model}...`, "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 2048,
                        topP: 0.95
                    }
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `Erreur ${response.status}`);
            }
            
            const data = await response.json();
            const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (!generatedText) {
                throw new Error("Réponse vide de l'API");
            }
            
            const parts = generatedText.split('***');
            let reponseClient = parts[0].trim();
            let baseContent = parts.length >= 2 ? parts[1].trim() : "B : \n\nA : \n\nS : \n\nE : ";
            
            // Nettoyer la réponse si elle contient déjà une signature
            const currentCanal = document.getElementById('canal_choix').value;
            const currentSignature = getSignatureByCanalAndHour();
            
            // Si la réponse ne contient pas déjà la signature, on l'ajoute
            if (!reponseClient.includes("Cordialement") && !reponseClient.includes("Je reste à votre disposition")) {
                reponseClient = reponseClient + "\n\n" + currentSignature;
            }
            
            document.getElementById('reponse_client').value = reponseClient;
            document.getElementById('base_area').value = baseContent;
            
            showStatus(`✅ Génération réussie avec ${model} !`, "success");
            
        } catch (error) {
            console.error('Erreur:', error);
            let errorMsg = error.message;
            
            if (errorMsg.includes("API key") || errorMsg.includes("key")) {
                errorMsg = "Clé API invalide. Vérifiez votre clé dans Configuration API.";
            } else if (errorMsg.includes("quota")) {
                errorMsg = "Quota API dépassé. Réessayez plus tard.";
            } else if (errorMsg.includes("model")) {
                errorMsg = `Le modèle "${model}" n'est pas disponible. Essayez un autre modèle.`;
            }
            
            showStatus(`❌ ${errorMsg}`, "error");
        } finally {
            isGenerating = false;
        }
    }
    
    function copierPromptComplet() {
        try {
            const prompt = construirePromptComplet();
            copyToClipboard(prompt);
            showStatus("📋 Prompt copié !", "success");
        } catch (error) {
            showStatus(`❌ ${error.message}`, "error");
        }
    }
    
    function preparerEtCopierHisto() {
        const d = document.getElementById('demande').value;
        const r = document.getElementById('reponse_client').value;
        const b = document.getElementById('base_area').value;
        const canal = document.getElementById('canal_choix').value;
        
        if (!d && !r) {
            showStatus("❌ Aucune donnée à historiser", "error");
            return;
        }
        
        const now = new Date();
        const datePoste = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        const heureMatch = d.match(/([01]?[0-9]|2[0-3])[:h][0-5][0-9]/i);
        const heureDemande = heureMatch ? heureMatch[0].replace('h', ':') : "--:--";
        
        let reponseSansBase = r;
        if (r.includes('***')) {
            reponseSansBase = r.split('***')[0].trim();
        }
        
        const labelEntete = (canal === "EMAIL") ? `Mail Odigo du ${datePoste} à ${heureDemande}` : `AM du ${datePoste} à ${heureDemande}`;
        
        const bloc = `${b || "B : \n\nA : \n\nS : \n\nE : "}\n\n***************************\n\n${labelEntete}\n\nRequête client :\n${d || "(non renseignée)"}\n\nRéponse apportée :\n\n${reponseSansBase || "(non renseignée)"}`;
        
        copyToClipboard(bloc);
        showStatus("📋 Historisation copiée !", "success");
    }
    
    function copierTexte(id) {
        const element = document.getElementById(id);
        if (!element.value.trim()) {
            showStatus(`⚠️ Champ vide`, "warning");
            return;
        }
        copyToClipboard(element.value);
        showStatus(`📋 Copié !`, "success");
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).catch(() => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    }
    
    function toutVider() {
        if(confirm("Effacer tous les champs ?")) {
            ['historique', 'demande', 'instructions', 'base_area'].forEach(id => {
                document.getElementById(id).value = "";
            });
            majSignature();
            showStatus("✅ Tout a été vidé", "success");
        }
    }
    
    function sauvegarderCleApi() {
        const apiKey = document.getElementById('api_key').value;
        if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
    }
    
    function sauvegarderModele() {
        const model = document.getElementById('model_select').value;
        localStorage.setItem('gemini_model', model);
    }
    
    function sauvegarderCanal() {
        const canal = document.getElementById('canal_choix').value;
        localStorage.setItem('canal_choix', canal);
    }
    
    function chargerDonnees() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api_key').value = savedKey;
        const savedModel = localStorage.getItem('gemini_model');
        if (savedModel) document.getElementById('model_select').value = savedModel;
        const savedCanal = localStorage.getItem('canal_choix');
        if (savedCanal) document.getElementById('canal_choix').value = savedCanal;
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        chargerDonnees();
        majSignature();
        
        document.getElementById('api_key').addEventListener('change', sauvegarderCleApi);
        document.getElementById('api_key').addEventListener('blur', sauvegarderCleApi);
        document.getElementById('model_select').addEventListener('change', sauvegarderModele);
        document.getElementById('canal_choix').addEventListener('change', sauvegarderCanal);
        
        ['historique', 'demande', 'instructions'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    genererAvecGemini();
                }
            });
        });
        
        showStatus("✅ Prêt ! Cliquez sur '⚙️ CONFIGURATION API' pour configurer Gemini", "success");
    });
</script>

</body>
</html>
