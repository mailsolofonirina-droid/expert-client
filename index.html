<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Expert Relation Client - Solofonirina</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; margin: 0; padding: 10px; font-size: 12px; color: #333; }
        .wrapper { display: grid; grid-template-columns: 0.8fr 2.4fr 0.8fr; gap: 15px; height: 97vh; }
        .column { background: #ffffff; border: 1px solid #eee; border-radius: 4px; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
        h2 { font-size: 0.9em; color: #888; margin-top: 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; text-transform: uppercase; }
        label { font-weight: bold; display: block; margin: 8px 0 3px 0; color: #777; font-size: 0.85em; }
        
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 2px; padding: 8px; box-sizing: border-box; font-family: inherit; resize: none; background: #fff; }
        
        /* Ajustement hauteurs colonne 1 */
        #historique, #demande { height: 12%; flex-grow: 0; }
        #instructions { flex-grow: 1; }

        /* Cage centrale : Police 18px et fond légèrement grisé */
        #reponse_client { flex-grow: 1; font-size: 18px; line-height: 1.5; background: #f9f9f9; border-color: #ccc; }

        /* Boutons gris très proche du blanc */
        .btn { cursor: pointer; border: 1px solid #ebebeb; border-radius: 2px; padding: 10px; font-weight: 500; transition: 0.2s; margin-top: 5px; width: 100%; background: #fdfdfd; color: #666; font-size: 0.9em; }
        .btn:hover { background: #f4f4f4; border-color: #ddd; }
        
        .btn-vider { background: #ffffff; border: 1px dashed #ccc; margin-bottom: 10px; color: #aaa; }
        
        .spacer { height: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    
    <div class="column">
        <h2>Préparation</h2>
        <label>Historique complet</label>
        <textarea id="historique" data-languagetool-ignore spellcheck="false" placeholder="Laisser vide si aucun historique..."></textarea>
        
        <label>Demande à traiter</label>
        <textarea id="demande" data-languagetool-ignore spellcheck="false" placeholder="Message client avec l'heure..."></textarea>
        
        <label>Instructions</label>
        <textarea id="instructions" data-languagetool-ignore spellcheck="false" placeholder="Rédigez vos consignes ici..."></textarea>
        
        <button class="btn" onclick="genererEtCopierPrompt()">GÉNÉRER ET COPIER LE PROMPT</button>
    </div>

    <div class="column">
        <h2>Traitement de la réponse</h2>
        <label>Rédaction (Police 18px)</label>
        <textarea id="reponse_client" spellcheck="true"></textarea>
        
        <button class="btn" onclick="copierTexte('reponse_client')">COPIER LA RÉPONSE CLIENT</button>
    </div>

    <div class="column">
        <h2>Suivi & BASE</h2>
        <button class="btn btn-vider" onclick="toutVider()">VIDER</button>

        <label>BASE</label>
        <textarea id="base_area" data-languagetool-ignore spellcheck="false" style="flex-grow: 1;" placeholder="B :&#10;A :&#10;S :&#10;E :"></textarea>
        <button class="btn" onclick="copierTexte('base_area')">COPIER BASE SEULE</button>

        <div class="spacer"></div>
        <button class="btn" style="padding: 15px;" onclick="preparerEtCopierHisto()">PRÉPARER ET COPIER HISTORISATION</button>
    </div>

</div>

<script>
    window.onload = function() {
        initSignature();
    };

    function initSignature() {
        const h = new Date().getHours();
        const m = new Date().getMinutes();
        const area = document.getElementById('reponse_client');
        
        const totalMinutes = (h * 60) + m;
        const limitAM = (16 * 60) + 49;

        if (totalMinutes >= 120 && totalMinutes <= limitAM) {
            area.value = "Bonjour Madame,\n\n\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer un excellent après-midi.\n\nCordialement,\n\nSolofonirina";
        } else {
            area.value = "Bonsoir Monsieur,\n\n\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer une excellente soirée.\n\nCordialement,\n\nSolofonirina";
        }
    }

    function genererEtCopierPrompt() {
        const hist = document.getElementById('historique').value.trim();
        const dem = document.getElementById('demande').value.trim();
        const inst = document.getElementById('instructions').value.trim();

        const fullPrompt = `Demande du client :
${hist ? "- historique :\n" + hist + "\n" : ""}
- demande à traiter :
${dem}

****************************
instruction de la réponse
${inst}
************************************
Directives de Rédaction (Expert Relation Client) :

1. Identité et Posture :

Persona : Vous êtes un conseiller expert du service client TotalEnergies.

Ton : Adoptez un ton chaleureux, rassurant et pédagogue.

La première phrase doit fusionner l'accueil et la prise en charge en adaptant le ton à l'émotion ou à la situation exprimée par le client. Vous devez varier vos formulations pour refléter précisément l'objet du message (regret pour un désagrément, apport de clarté pour un doute ou accompagnement pour une démarche) afin d'éviter toute répétition automatique.


2. Articulation et fluidité :

Rédaction naturelle, sans exagération des connecteurs logiques. Séparez chaque idée par un paragraphe distinct.

3. Règles de Construction Stricte :

Format : Texte simple (e-mail), sans listes à puces ni tirets (sauf pour la section BASE).


Personnalisation : Utilisez le "je" pour vos actions et le "nous" pour représenter TotalEnergies.

Syntaxes obligatoires : Utilisez le mode déclaratif. Pour les actions attendues du client, utilisez des formes de courtoisie (Ex : "Je vous invite à", "je vous prie de").

Chiffres et Unités : Écrivez les nombres en chiffres (ex: 2 jours, 150 €). Utilisez strictement les unités : €, kWh, kVA.

Format des Dates : Toutes les dates doivent être rédigées au format "jour mois année" avec le mois écrit en lettres (ex : 5 mars 2026). L'utilisation de barres obliques (/) pour les dates est interdite.


Temps : Utilisez le futur simple pour les actions à venir (ex: "Je ferai").

Respect des Rubriques : Lors d'une redirection vers l'Espace Client, vous devez impérativement respecter la mise en page suivante : dans la rubrique "Nom de la rubrique > Sous-rubrique". 
n'invite aucune rubrique

ne supprime pas le lien que je met dans la réponse

Interdiction d'extrapoler les rubriques : Vous devez utiliser exclusivement les rubriques et sous-rubriques explicitement fournies dans les instructions de gestion ou les exemples du prompt. S'il n'y a pas de rubrique mentionnée pour une action spécifique, ne proposez pas de chemin de navigation.

4. Lexique et Terminologie :

Mots à banir : problème, malheureusement, recommander, engager, engagement, meilleurs délais, impatience, co-titulaire

Respecter : ENEDIS, gestionnaire du réseau d'électricité ; GRDF, gestionnaire du réseau de gaz ; Heures Pleines / Heures Creuses ; chèque énergie.

Respecter la ponctuation : virgule (,) en fin de ligne si incomplet, point (.) si phrase complète. La dernière ligne finit toujours par un point.

Le nom du client, prénom du client, adresse du client doivent être au majuscule
sur la civilité : seul l'initial est au majuscule (Madame/Monsieur)


Majuscules systématiques : Les noms des services internes doivent toujours porter une majuscule sur chaque initiale (ex: Service Technique, Service Déménagement....).

Séparer chaque idée par paragraphe

Si je mentionne que j'ai transmis la demande à un autre service dans la réponse, fourrnir une commentaire expliquer la demande du client avant la BASE  afin que le service concerné puisse comprendre la demande du client 

Contact du Service Paiement : 09 70 80 65 45 (prix d’un appel local), disponible du lundi au samedi, de 9 h à 19 h

Contact de l'Agence de Services et de Paiements (ASP) : 08 05 20 48 05

Contact Service Technique : 09 70 80 69 69 (du lundi au samedi, de 9 h à 19 h).

Contact Service Clientèle : 09 70 80 69 69 (du lundi au samedi, de 9 h à 19 h).

Contact Service Commercial : 30 99, disponible tous les jours de 8 h à 20 h

Engagement Satisfaction Client et Pédagogie :

Valorisation et Allié du Client : Adoptez une posture de partenaire conseil. Si une demande n'est pas recevable, ne vous contentez pas d'un refus ; expliquez le "pourquoi" pédagogiquement et basculez immédiatement sur une solution alternative ou un conseil utile (méthode du pivot positif).

Transparence et Clarté : Évitez le jargon technique. Expliquez les calculs ou les règles de gestion de manière simple pour que le client comprenne la situation, ce qui réduit la frustration même en cas de désaccord.

Preuve d'Étude du Dossier : Pour montrer que la demande a été traitée avec soin, citez systématiquement des éléments précis (montant exact TTC, numéro de facture, dates ou index de consommation....).


Structure de la Réponse Attendue :


Objet d'e-mail synthétique (pas de point à la fin de l'objet)

Corps de l'e-mail avec salutations et formule de politesse personnalisée.

Séparateur (***).

Section BASE (Format Stricte).


📝 Complétion BASE (Format Stricte)

B : résumé de la demande du client en une phrase simple >>> le client demande/souhaite

(ligne vide) A : informations factuelles et précises constatées sur le dossier du client après vérification. Si aucune information spécifique au dossier ne correspond à l'analyse, cette ligne doit rester vide.


(ligne vide) S : résumé clair de la solution ou information apportée en utilisant "j'ai informé/fait/proposé/expliqué"


(ligne vide) E :  les actions possibles sur l'Espace Client/Application Mobile ou les anticipation que j'ai indiquées dans la réponse. Indiquer n/a si aucun des deux.`;

        copyText(fullPrompt);
    }

    function preparerEtCopierHisto() {
        const d = document.getElementById('demande').value;
        const r = document.getElementById('reponse_client').value;
        const b = document.getElementById('base_area').value;
        const now = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        const datePoste = now.toLocaleDateString('fr-FR', options);
        const heureMatch = d.match(/([01]?[0-9]|2[0-3])[:h][0-5][0-9]/i);
        const heureDemande = heureMatch ? heureMatch[0].replace('h', ':') : "--:--";
        const rP = r.split('***')[0].trim();
        const bloc = `${b || "B : \n\nA : \n\nS : \n\nE : "}\n\n***************************\n\nAM du ${datePoste} à ${heureDemande}\n\nRequête client :\n${d}\n\nRéponse apportée :\n\n${rP}`;
        copyText(bloc);
    }

    function copierTexte(id) {
        copyText(document.getElementById(id).value);
    }

    function copyText(val) {
        navigator.clipboard.writeText(val);
    }

    function toutVider() {
        if(confirm("Effacer tout pour un nouveau dossier ?")) {
            ['historique', 'demande', 'instructions', 'base_area'].forEach(id => {
                document.getElementById(id).value = "";
            });
            initSignature();
        }
    }
</script>

</body>
</html>
