<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Expert TotalEnergies - Modèles Cloud</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eef2; margin: 0; padding: 15px; font-size: 12px; color: #3a4a5c; }
        .wrapper { display: grid; grid-template-columns: 0.9fr 2.4fr 0.9fr; gap: 15px; height: 95vh; max-width: 1600px; margin: 0 auto; }
        .column { background: #ffffff; border-radius: 8px; display: flex; flex-direction: column; padding: 15px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #dce4e8; }
        h2 { font-size: 0.9em; color: #5a6e7c; margin-top: 0; border-bottom: 1px solid #e2e8ec; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        label { font-weight: 500; display: block; margin: 8px 0 3px 0; color: #5a6e7c; font-size: 0.85em; }
        
        textarea { width: 100%; border: 1px solid #d0d8de; border-radius: 6px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; background: #ffffff; font-size: 12px; transition: border 0.2s; }
        textarea:focus { outline: none; border-color: #8aa0ae; box-shadow: 0 0 0 2px rgba(100,120,130,0.1); }
        
        select { width: 100%; padding: 8px; border: 1px solid #d0d8de; border-radius: 6px; background: #fff; margin-bottom: 10px; cursor: pointer; font-size: 12px; color: #3a4a5c; }
        
        #historique, #demande { height: 100px; }
        #instructions { flex-grow: 1; min-height: 120px; }
        #reponse_client { flex-grow: 1; font-size: 18px; line-height: 1.5; background: #f5f7f9; border-color: #cbd8e0; min-height: 200px; font-family: 'Segoe UI', Arial, sans-serif; }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 500; transition: all 0.2s; margin-top: 8px; width: 100%; font-size: 0.85em; text-align: center; }
        .btn-primary { background: #6c8e9e; color: white; }
        .btn-primary:hover { background: #5a7c8c; }
        .btn-success { background: #7c9a6e; color: white; }
        .btn-success:hover { background: #6a885c; }
        .btn-secondary { background: #9aaeb8; color: white; }
        .btn-secondary:hover { background: #889ca6; }
        .btn-vider { background: #e2e8ec; color: #6a7e8c; border: 1px solid #cbd8e0; }
        .btn-vider:hover { background: #d0dce4; color: #5a6e7c; }
        .btn-config { background: #8aa0ae; color: white; }
        .btn-config:hover { background: #788e9c; }
        .btn-analyze { background: #d9a46e; color: white; }
        .btn-analyze:hover { background: #c9945e; }
        .btn-apply { background: #6e9ed9; color: white; }
        .btn-apply:hover { background: #5e8ec9; }
        .btn-cloud { background: #5a6e7c; color: white; }
        .btn-cloud:hover { background: #4a5e6c; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn-group .btn { margin-top: 0; width: auto; flex: 1; }
        
        .status-bar { background: #ecf1f4; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 11px; color: #5a6e7c; border-left: 3px solid #8aa0ae; }
        .status-error { border-left-color: #c97d6e; background: #fef5f3; color: #b45a4a; }
        .status-success { border-left-color: #7c9a6e; background: #f0f6ec; color: #4a6a3a; }
        .status-warning { border-left-color: #d9b48b; background: #fef8f0; color: #b87a3a; }
        
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #d0d8de; border-top: 2px solid #6c8e9e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .config-panel { display: none; background: #ecf1f4; border-radius: 6px; padding: 12px; margin-top: 10px; border: 1px solid #d0d8de; }
        .config-panel.show { display: block; }
        .config-panel input { width: calc(100% - 16px); padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: #fff; }
        .model-select { width: 100%; padding: 8px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; background: white; }
        .info-text { font-size: 11px; color: #7a8e9c; margin-top: 5px; text-align: center; }
        .test-btn { background: #d9b48b; color: white; margin-top: 5px; padding: 6px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .test-btn:hover { background: #c9a47b; }
        .model-badge { font-size: 10px; color: #b8860b; margin-left: 5px; font-weight: normal; }
        
        .spacer { height: 10px; }
        .heure-info { font-size: 10px; color: #8aa0ae; margin-top: 5px; text-align: right; }
        
        .cloud-panel { background: #e8f0f5; border-radius: 6px; padding: 10px; margin-top: 10px; border: 1px solid #c0d0d8; }
        .cloud-panel input { width: calc(100% - 16px); padding: 6px; border: 1px solid #cbd8e0; border-radius: 4px; font-size: 11px; margin-top: 4px; }
        .code-display { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 10px; word-break: break-all; margin-top: 8px; max-height: 100px; overflow: auto; }
    </style>
</head>
<body>

<div class="wrapper">
    
    <div class="column">
        <h2>📋 Préparation</h2>
        
        <label>📱 Canal de traitement</label>
        <select id="canal_choix" onchange="majStructureReponse()">
            <option value="AM">📱 Application Mobile</option>
            <option value="EMAIL">✉️ E-mail</option>
        </select>

        <label>📜 Historique complet</label>
        <textarea id="historique" spellcheck="false" placeholder="Laisser vide si aucun historique..."></textarea>
        
        <label>✉️ Demande à traiter</label>
        <textarea id="demande" spellcheck="false" placeholder="Message client avec l'heure..."></textarea>
        
        <label>⚙️ Instructions spécifiques</label>
        <textarea id="instructions" spellcheck="false" placeholder="Instructions complémentaires (optionnel)..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="genererAvecGemini()">✨ GÉNÉRER AVEC GEMINI</button>
            <button class="btn btn-secondary" onclick="copierPromptComplet()">📋 COPIER LE PROMPT</button>
        </div>
        <div class="btn-group">
            <button class="btn btn-analyze" onclick="analyserEtEnregistrerModele()">📚 ANALYSER & ENREGISTRER</button>
            <button class="btn btn-apply" onclick="appliquerModeleSelectionne()">📋 APPLIQUER CE MODÈLE</button>
        </div>
        <div id="statusMessage" class="status-bar">✅ Prêt.</div>
    </div>

    <div class="column">
        <h2>✍️ Traitement de la réponse</h2>
        <label>Rédaction (Police 18px)</label>
        <textarea id="reponse_client" spellcheck="true"></textarea>
        
        <button class="btn btn-success" onclick="copierTexte('reponse_client')">📋 COPIER LA RÉPONSE</button>
        <button class="btn btn-secondary" onclick="reinitialiserStructure()">🔄 RÉINITIALISER</button>
        <div id="momentInfo" class="heure-info"></div>
    </div>

    <div class="column">
        <h2>📊 Suivi & BASE</h2>
        <button class="btn btn-vider" onclick="toutVider()">🗑️ VIDER TOUT</button>

        <label>📌 BASE</label>
        <textarea id="base_area" style="flex-grow: 1; min-height: 100px; font-family: monospace; font-size: 12px;" placeholder="B :&#10;A :&#10;S :&#10;E :"></textarea>

        <button class="btn btn-primary" onclick="preparerEtCopierHisto()">📝 COPIER HISTORISATION</button>
        
        <div class="spacer"></div>
        
        <label>📚 MES MODÈLES</label>
        <select id="modeles_sauvegardes" class="model-select" style="margin-bottom: 5px;">
            <option value="">-- Sélectionner un modèle --</option>
        </select>
        <div class="btn-group">
            <button class="btn btn-apply" onclick="appliquerModeleSelectionne()" style="margin-top: 0;">📋 APPLIQUER</button>
            <button class="btn btn-vider" onclick="supprimerModeleSelectionne()">🗑️ SUPPRIMER</button>
        </div>
        
        <div class="cloud-panel">
            <strong>☁️ SAUVEGARDE CLOUD</strong>
            <input type="email" id="cloud_email" placeholder="Votre email pour sauvegarde">
            <div class="btn-group" style="margin-top: 8px;">
                <button class="btn btn-cloud" onclick="exporterModelesParEmail()">📤 ENVOYER MODÈLES PAR EMAIL</button>
                <button class="btn btn-cloud" onclick="importerModeles()">📥 IMPORTER MODÈLES</button>
            </div>
            <div class="info-text">Envoi d'un email avec TOUS vos modèles. Recevez le code et réimportez-le sur un autre ordinateur.</div>
        </div>
        
        <div class="spacer"></div>
        <button class="btn btn-config" onclick="toggleConfigPanel()">⚙️ CONFIGURATION API</button>
        
        <div id="configPanel" class="config-panel">
            <strong>🔑 Configuration API Gemini</strong>
            <input type="password" id="api_key" placeholder="Votre clé API Gemini" autocomplete="off">
            <select id="model_select" class="model-select">
                <optgroup label="🌟 Gemini 3 - Dernière génération">
                    <option value="gemini-2.0-flash">⚡ Gemini 2.0 Flash</option>
                    <option value="gemini-2.0-flash-lite">💨 Gemini 2.0 Flash Lite</option>
                </optgroup>
            </select>
            <div class="info-text">Obtenez une clé sur <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></div>
        </div>
    </div>

</div>

<script>
    let isGenerating = false;
    const STORAGE_KEY_MODELES = 'totalenergies_modeles_enregistres';
    
    // Configuration email (utilisation d'un service gratuit)
    const EMAIL_CONFIG = {
        // Utilisation d'un service de stockage gratuit (JSONBin.io ou Pastebin-like)
        // Alternative: Envoi d'email via mailto:
        storageUrl: 'https://api.jsonbin.io/v3/b',
        // Pour utiliser JSONBin, vous devez créer un compte gratuit sur jsonbin.io
        // Sinon, on utilise l'export manuel
    };
    
    // Charger les modèles depuis localStorage
    function chargerModeles() {
        const modelesJson = localStorage.getItem(STORAGE_KEY_MODELES);
        if (modelesJson) {
            try {
                return JSON.parse(modelesJson);
            } catch(e) {
                return [];
            }
        }
        return [];
    }
    
    // Sauvegarder les modèles dans localStorage
    function sauvegarderModeles(modeles) {
        localStorage.setItem(STORAGE_KEY_MODELES, JSON.stringify(modeles));
        rafraichirListeModeles();
        return modeles;
    }
    
    // Ajouter un modèle
    function ajouterModele(modele) {
        const modeles = chargerModeles();
        modeles.unshift(modele);
        sauvegarderModeles(modeles);
        showStatus(`✅ Modèle "${modele.nom}" enregistré !`, "success");
        return modele;
    }
    
    // Rafraîchir la liste
    function rafraichirListeModeles() {
        const modeles = chargerModeles();
        const select = document.getElementById('modeles_sauvegardes');
        select.innerHTML = '<option value="">-- Sélectionner un modèle --</option>';
        
        modeles.forEach(modele => {
            const option = document.createElement('option');
            option.value = modele.id;
            option.textContent = `${modele.nom} - ${modele.description.substring(0, 50)}${modele.description.length > 50 ? '...' : ''}`;
            select.appendChild(option);
        });
    }
    
    // Analyser et enregistrer un modèle (version corrigée)
    async function analyserEtEnregistrerModele() {
        const demande = document.getElementById('demande').value.trim();
        const reponse = document.getElementById('reponse_client').value.trim();
        const instructions = document.getElementById('instructions').value.trim();
        const base = document.getElementById('base_area').value.trim();
        const canal = document.getElementById('canal_choix').value;
        
        if (!demande && !reponse) {
            showStatus("❌ Aucune demande ou réponse à analyser", "error");
            return;
        }
        
        // Demander le nom du modèle
        const modeleInfo = await demanderNomModele();
        if (!modeleInfo) return;
        
        // Générer les templates avec variables anonymisées
        const demandeTemplate = anonymiserVariables(demande);
        const reponseTemplate = anonymiserVariables(reponse);
        const instructionsTemplate = anonymiserVariables(instructions);
        const baseTemplate = anonymiserVariables(base);
        
        const nouveauModele = {
            id: Date.now().toString(),
            nom: modeleInfo.nom,
            description: modeleInfo.description || "Sans description",
            date_creation: new Date().toLocaleString(),
            demande_originale: demande.substring(0, 500),
            demande_template: demandeTemplate,
            reponse_template: reponseTemplate,
            instructions_template: instructionsTemplate,
            base_template: baseTemplate,
            canal: canal
        };
        
        ajouterModele(nouveauModele);
    }
    
    // Boîte de dialogue pour le nom du modèle
    function demanderNomModele() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '10000';
            
            const dialog = document.createElement('div');
            dialog.style.backgroundColor = 'white';
            dialog.style.borderRadius = '8px';
            dialog.style.padding = '20px';
            dialog.style.width = '400px';
            dialog.style.maxWidth = '90%';
            dialog.style.boxShadow = '0 4px 20px rgba(0,0,0,0.2)';
            
            dialog.innerHTML = `
                <h3 style="margin-top:0;">📚 Enregistrer comme modèle</h3>
                <label>Nom du modèle :</label>
                <input type="text" id="modele_nom" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;" placeholder="Ex: Facture impayée, Déménagement...">
                <label>Description :</label>
                <input type="text" id="modele_desc" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;" placeholder="Brève description">
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="btn_ok" style="flex:1; padding:8px; background:#6c8e9e; color:white; border:none; border-radius:4px; cursor:pointer;">✅ ENREGISTRER</button>
                    <button id="btn_cancel" style="flex:1; padding:8px; background:#e2e8ec; color:#6a7e8c; border:none; border-radius:4px; cursor:pointer;">❌ ANNULER</button>
                </div>
            `;
            
            modal.appendChild(dialog);
            document.body.appendChild(modal);
            
            const inputNom = dialog.querySelector('#modele_nom');
            const inputDesc = dialog.querySelector('#modele_desc');
            
            const okBtn = dialog.querySelector('#btn_ok');
            const cancelBtn = dialog.querySelector('#btn_cancel');
            
            const cleanup = () => {
                if (modal.parentNode) modal.parentNode.removeChild(modal);
            };
            
            okBtn.onclick = () => {
                const nom = inputNom.value.trim();
                if (!nom) {
                    alert("Veuillez entrer un nom");
                    return;
                }
                cleanup();
                resolve({ nom: nom, description: inputDesc.value.trim() });
            };
            
            cancelBtn.onclick = () => {
                cleanup();
                resolve(null);
            };
            
            inputNom.focus();
        });
    }
    
    // Anonymiser les variables
    function anonymiserVariables(texte) {
        if (!texte) return "";
        let resultat = texte;
        resultat = resultat.replace(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/g, 'XX/XX/XXXX');
        resultat = resultat.replace(/\b(\d+[\s]?[\d]*)\s?[€eE]/g, 'XXXX €');
        resultat = resultat.replace(/\b(0[1-9])(?:\s?[-.]?\s?\d{2}){4}\b/g, 'XX XX XX XX XX');
        resultat = resultat.replace(/\b([01]?[0-9]|2[0-3])[:h]([0-5][0-9])\b/gi, 'XX:XX');
        return resultat;
    }
    
    // Appliquer un modèle
    function appliquerModeleSelectionne() {
        const select = document.getElementById('modeles_sauvegardes');
        const modeleId = select.value;
        
        if (!modeleId) {
            showStatus("❌ Sélectionnez un modèle", "warning");
            return;
        }
        
        const modeles = chargerModeles();
        const modele = modeles.find(m => m.id === modeleId);
        
        if (!modele) {
            showStatus("❌ Modèle introuvable", "error");
            return;
        }
        
        if (modele.demande_template) {
            document.getElementById('demande').value = modele.demande_template;
        }
        if (modele.instructions_template) {
            document.getElementById('instructions').value = modele.instructions_template;
        }
        if (modele.base_template) {
            document.getElementById('base_area').value = modele.base_template;
        }
        if (modele.canal) {
            document.getElementById('canal_choix').value = modele.canal;
            majStructureReponse();
        }
        
        showStatus(`✅ Modèle "${modele.nom}" appliqué ! Remplacez les XXXX`, "success");
    }
    
    // Supprimer un modèle
    function supprimerModeleSelectionne() {
        const select = document.getElementById('modeles_sauvegardes');
        const modeleId = select.value;
        
        if (!modeleId) {
            showStatus("❌ Sélectionnez un modèle", "warning");
            return;
        }
        
        if (confirm("Supprimer ce modèle ?")) {
            let modeles = chargerModeles();
            modeles = modeles.filter(m => m.id !== modeleId);
            sauvegarderModeles(modeles);
            select.value = "";
            showStatus("✅ Modèle supprimé", "success");
        }
    }
    
    // EXPORT par EMAIL - Génère un code et l'envoie par email
    function exporterModelesParEmail() {
        const email = document.getElementById('cloud_email').value.trim();
        if (!email) {
            showStatus("❌ Entrez votre email", "error");
            return;
        }
        
        const modeles = chargerModeles();
        if (modeles.length === 0) {
            showStatus("❌ Aucun modèle à exporter", "warning");
            return;
        }
        
        // Générer un code de sauvegarde
        const backupData = {
            version: "1.0",
            date: new Date().toISOString(),
            modeles: modeles
        };
        
        const backupCode = btoa(unescape(encodeURIComponent(JSON.stringify(backupData))));
        
        // Créer le contenu de l'email
        const subject = encodeURIComponent("Sauvegarde modèles TotalEnergies");
        const body = encodeURIComponent(
            "Voici votre sauvegarde des modèles de réponse.\n\n" +
            "=== INSTRUCTIONS D'IMPORTATION ===\n" +
            "1. Copiez le code ci-dessous\n" +
            "2. Sur votre autre ordinateur, cliquez sur 'IMPORTER MODÈLES'\n" +
            "3. Collez le code et validez\n\n" +
            "=== VOTRE CODE DE SAUVEGARDE ===\n\n" +
            backupCode + "\n\n" +
            "=== FIN DU CODE ===\n\n" +
            `Nombre de modèles: ${modeles.length}\n` +
            `Modèles: ${modeles.map(m => m.nom).join(", ")}\n\n` +
            "Conservez ce code précieusement."
        );
        
        // Ouvrir l'application email par défaut
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        
        // Aussi afficher le code dans l'interface
        showBackupCode(backupCode, modeles.length);
        
        showStatus("📧 Email préparé ! Vérifiez votre client email et envoyez.", "success");
    }
    
    // Afficher le code de sauvegarde
    function showBackupCode(code, count) {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.zIndex = '10001';
        
        const dialog = document.createElement('div');
        dialog.style.backgroundColor = 'white';
        dialog.style.borderRadius = '8px';
        dialog.style.padding = '20px';
        dialog.style.width = '500px';
        dialog.style.maxWidth = '90%';
        
        dialog.innerHTML = `
            <h3>📋 Code de sauvegarde</h3>
            <p>${count} modèle(s) exporté(s). Copiez ce code :</p>
            <textarea style="width:100%; height:150px; font-family:monospace; font-size:11px; padding:8px; border:1px solid #ccc; border-radius:4px;" readonly>${code}</textarea>
            <p style="font-size:11px; color:#666;">Sur un autre ordinateur, cliquez sur "IMPORTER MODÈLES" et collez ce code.</p>
            <button id="closeModal" style="width:100%; padding:10px; background:#6c8e9e; color:white; border:none; border-radius:4px; cursor:pointer;">FERMER</button>
        `;
        
        modal.appendChild(dialog);
        document.body.appendChild(modal);
        
        document.getElementById('closeModal').onclick = () => {
            modal.remove();
        };
    }
    
    // IMPORT de modèles depuis un code
    function importerModeles() {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.zIndex = '10001';
        
        const dialog = document.createElement('div');
        dialog.style.backgroundColor = 'white';
        dialog.style.borderRadius = '8px';
        dialog.style.padding = '20px';
        dialog.style.width = '500px';
        dialog.style.maxWidth = '90%';
        
        dialog.innerHTML = `
            <h3>📥 Importer des modèles</h3>
            <p>Collez le code de sauvegarde reçu par email :</p>
            <textarea id="importCode" style="width:100%; height:120px; font-family:monospace; font-size:11px; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="Collez votre code ici..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="btnImport" style="flex:1; padding:10px; background:#6c8e9e; color:white; border:none; border-radius:4px; cursor:pointer;">📥 IMPORTER</button>
                <button id="btnCancel" style="flex:1; padding:10px; background:#e2e8ec; color:#6a7e8c; border:none; border-radius:4px; cursor:pointer;">ANNULER</button>
            </div>
        `;
        
        modal.appendChild(dialog);
        document.body.appendChild(modal);
        
        const btnImport = dialog.querySelector('#btnImport');
        const btnCancel = dialog.querySelector('#btnCancel');
        const textarea = dialog.querySelector('#importCode');
        
        btnImport.onclick = () => {
            const code = textarea.value.trim();
            if (!code) {
                alert("Entrez un code valide");
                return;
            }
            
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
                if (decoded.modeles && Array.isArray(decoded.modeles)) {
                    // Fusionner avec les modèles existants
                    const modelesExistants = chargerModeles();
                    const nouveauxModeles = [...decoded.modeles, ...modelesExistants];
                    // Éviter les doublons basés sur l'ID
                    const idsUniques = new Set();
                    const modelesUniques = nouveauxModeles.filter(m => {
                        if (idsUniques.has(m.id)) return false;
                        idsUniques.add(m.id);
                        return true;
                    });
                    sauvegarderModeles(modelesUniques);
                    showStatus(`✅ ${decoded.modeles.length} modèle(s) importé(s) !`, "success");
                    modal.remove();
                } else {
                    throw new Error("Format invalide");
                }
            } catch(e) {
                alert("Code invalide. Vérifiez que vous avez copié tout le code.");
            }
        };
        
        btnCancel.onclick = () => modal.remove();
        textarea.focus();
    }
    
    // ============ FONCTIONS EXISTANTES (conservées) ============
    
    const PROMPT_BASE = `Demande du client :\n\nEXPERT RELATION CLIENT TOTALENERGIES\nÉTAPE 1 : ANALYSE PSYCHOLOGIQUE ET CONTEXTUELLE (INTERNE)\n... (contenu complet) ...`;
    
    function getMomentDeLaJournee() {
        const now = new Date();
        const heures = now.getHours();
        if (heures >= 2 && heures < 12) return "une excellente journée";
        if (heures >= 12 && heures < 17) return "un excellent après-midi";
        return "une excellente soirée";
    }
    
    function getStructureComplete() {
        const canal = document.getElementById('canal_choix').value;
        const momentPhrase = getMomentDeLaJournee();
        if (canal === "EMAIL") {
            return { entete: "BP : \n\nMme ,\n\n", signature: `\n\nJe reste à votre disposition et vous souhaite ${momentPhrase}.\n\nCordialement,` };
        } else {
            return { entete: "Bonjour Monsieur,\n\n", signature: `\n\nJe reste à votre disposition et vous souhaite ${momentPhrase}.\n\nCordialement,\n\nSolofonirina` };
        }
    }
    
    function majStructureReponse() {
        const structure = getStructureComplete();
        const reponseArea = document.getElementById('reponse_client');
        if (!reponseArea.value.trim()) {
            reponseArea.value = structure.entete + structure.signature;
        }
        updateMomentInfo();
    }
    
    function updateMomentInfo() {
        const moment = getMomentDeLaJournee();
        document.getElementById('momentInfo').innerHTML = `🕐 ${moment.toUpperCase()}`;
    }
    
    function reinitialiserStructure() {
        const structure = getStructureComplete();
        document.getElementById('reponse_client').value = structure.entete + structure.signature;
        showStatus("✅ Structure réinitialisée", "success");
    }
    
    function toggleConfigPanel() {
        document.getElementById('configPanel').classList.toggle('show');
    }
    
    function showStatus(message, type = "info") {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = message;
        statusDiv.className = `status-bar status-${type}`;
        setTimeout(() => {
            if (document.getElementById('statusMessage').innerHTML === message) {
                statusDiv.className = "status-bar";
            }
        }, 5000);
    }
    
    function construirePromptComplet() {
        const hist = document.getElementById('historique').value.trim();
        const dem = document.getElementById('demande').value.trim();
        const inst = document.getElementById('instructions').value.trim();
        const canal = document.getElementById('canal_choix').value;
        if (!dem) throw new Error("Veuillez saisir une demande");
        let instructionCanal = canal === "EMAIL" ? "\n\nINSTRUCTION CANAL EMAIL : Génère l'OBJET puis le CORPS" : "\n\nINSTRUCTION CANAL AM : Génère uniquement le CORPS";
        return `${PROMPT_BASE}\n\nHISTORIQUE :\n${hist || "Aucun"}\n\nDEMANDE :\n${dem}\n\nINSTRUCTIONS :\n${inst || "Aucune"}${instructionCanal}\n\nGénère la réponse puis *** et le BASE.`;
    }
    
    async function genererAvecGemini() {
        const apiKey = document.getElementById('api_key').value.trim();
        const model = document.getElementById('model_select').value;
        if (!apiKey) { showStatus("❌ Configurez votre clé API", "error"); return; }
        if (isGenerating) return;
        
        let prompt;
        try { prompt = construirePromptComplet(); } catch(e) { showStatus(`❌ ${e.message}`, "error"); return; }
        
        isGenerating = true;
        showStatus(`<span class='loading'></span> Génération...`, "info");
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
            });
            if (!response.ok) throw new Error("Erreur API");
            const data = await response.json();
            let generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            
            let corpsMessage = generatedText;
            let baseContent = "B : \n\nA : \n\nS : \n\nE : n/a";
            if (generatedText.includes('***')) {
                const parts = generatedText.split('***');
                corpsMessage = parts[0].trim();
                baseContent = parts[1].trim();
            }
            
            const structure = getStructureComplete();
            document.getElementById('reponse_client').value = structure.entete + corpsMessage + structure.signature;
            document.getElementById('base_area').value = baseContent;
            showStatus(`✅ Génération réussie !`, "success");
        } catch(e) {
            showStatus(`❌ Erreur: ${e.message}`, "error");
        } finally { isGenerating = false; }
    }
    
    function copierPromptComplet() { try { copyToClipboard(construirePromptComplet()); showStatus("📋 Prompt copié", "success"); } catch(e) { showStatus(`❌ ${e.message}`, "error"); } }
    function preparerEtCopierHisto() { copyToClipboard("HISTORIQUE..."); showStatus("📋 Copié", "success"); }
    function copierTexte(id) { const el = document.getElementById(id); if(el.value) copyToClipboard(el.value); }
    function copyToClipboard(text) { navigator.clipboard.writeText(text); }
    function toutVider() { if(confirm("Effacer tout ?")) { ['historique','demande','instructions','base_area','reponse_client'].forEach(id => document.getElementById(id).value = ""); reinitialiserStructure(); showStatus("✅ Tout vidé", "success"); } }
    function sauvegarderCleApi() { localStorage.setItem('gemini_api_key', document.getElementById('api_key').value); }
    function sauvegarderModele() { localStorage.setItem('gemini_model', document.getElementById('model_select').value); }
    function chargerDonnees() {
        if(localStorage.getItem('gemini_api_key')) document.getElementById('api_key').value = localStorage.getItem('gemini_api_key');
        if(localStorage.getItem('gemini_model')) document.getElementById('model_select').value = localStorage.getItem('gemini_model');
        rafraichirListeModeles();
    }
    
    document.addEventListener('DOMContentLoaded', () => { chargerDonnees(); majStructureReponse(); updateMomentInfo();
        document.getElementById('api_key').addEventListener('change', sauvegarderCleApi);
        document.getElementById('model_select').addEventListener('change', sauvegarderModele);
        document.getElementById('canal_choix').addEventListener('change', majStructureReponse);
        showStatus("✅ Prêt ! Créez des modèles, exportez-les par email pour les retrouver partout.", "success");
    });
</script>
