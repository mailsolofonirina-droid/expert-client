<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Expert Relation Client - Gemini Edition</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; margin: 0; padding: 10px; font-size: 12px; color: #333; }
        .wrapper { display: grid; grid-template-columns: 0.8fr 2.4fr 0.8fr; gap: 15px; height: 97vh; }
        .column { background: #ffffff; border: 1px solid #eee; border-radius: 4px; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
        h2 { font-size: 0.9em; color: #888; margin-top: 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; text-transform: uppercase; }
        label { font-weight: bold; display: block; margin: 8px 0 3px 0; color: #777; font-size: 0.85em; }
        textarea, input { width: 100%; border: 1px solid #ddd; border-radius: 2px; padding: 8px; box-sizing: border-box; font-family: inherit; resize: none; background: #fff; }
        #historique, #demande { height: 12%; flex-grow: 0; }
        #instructions { flex-grow: 1; }
        #reponse_client { flex-grow: 1; font-size: 18px; line-height: 1.5; background: #f9f9f9; border-color: #ccc; }
        .btn { cursor: pointer; border: 1px solid #ebebeb; border-radius: 2px; padding: 10px; font-weight: 500; transition: 0.2s; margin-top: 5px; width: 100%; background: #fdfdfd; color: #666; font-size: 0.9em; }
        .btn:hover { background: #f4f4f4; border-color: #ddd; }
        .btn-ai { background: #e3f2fd; border-color: #2196f3; color: #1976d2; font-weight: bold; }
        .btn-ai:hover { background: #bbdefb; }
        .btn-vider { background: #ffffff; border: 1px dashed #ccc; margin-bottom: 10px; color: #aaa; }
        .spacer { height: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="column">
        <h2>Préparation</h2>
        <label>Clé API Gemini (sauvegardée localement)</label>
        <input type="password" id="api_key" placeholder="AIzaSyC-5ibGl9hJ-nXzV_8h2aNNI2GVZ04tfB8" onchange="saveKey()">
        
        <label>Historique complet</label>
        <textarea id="historique" placeholder="Laisser vide si aucun historique..."></textarea>
        
        <label>Demande à traiter</label>
        <textarea id="demande" placeholder="Message client avec l'heure..."></textarea>
        
        <label>Instructions de rédaction</label>
        <textarea id="instructions" placeholder="Rédigez vos consignes ici..."></textarea>
        
        <button class="btn btn-ai" id="btn_generer" onclick="genererAvecGemini()">GÉNÉRER AVEC GEMINI ✨</button>
    </div>

    <div class="column">
        <h2>Traitement de la réponse</h2>
        <label>Rédaction (Police 18px)</label>
        <textarea id="reponse_client" spellcheck="true"></textarea>
        <button class="btn" onclick="copierTexte('reponse_client')">COPIER LA RÉPONSE CLIENT</button>
    </div>

    <div class="column">
        <h2>Suivi & BASE</h2>
        <button class="btn btn-vider" onclick="toutVider()">VIDER TOUT</button>
        <label>BASE</label>
        <textarea id="base_area" style="flex-grow: 1;" placeholder="B :&#10;A :&#10;S :&#10;E :"></textarea>
        <button class="btn" onclick="copierTexte('base_area')">COPIER BASE SEULE</button>
        <div class="spacer"></div>
        <button class="btn" style="padding: 15px;" onclick="preparerEtCopierHisto()">PRÉPARER ET COPIER HISTORISATION</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // Chargement de la clé au démarrage
    window.onload = function() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api_key').value = savedKey;
        initSignature();
    };

    window.saveKey = function() {
        localStorage.setItem('gemini_api_key', document.getElementById('api_key').value);
    };

    window.genererAvecGemini = async function() {
        const btn = document.getElementById('btn_generer');
        const key = document.getElementById('api_key').value;
        const hist = document.getElementById('historique').value;
        const dem = document.getElementById('demande').value;
        const inst = document.getElementById('instructions').value;

        if (!key) return alert("Veuillez saisir votre clé API.");
        
        btn.innerText = "GÉNÉRATION EN COURS...";
        btn.disabled = true;

        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `Tu es un expert en relation client. Rédige la réponse au client et la section BASE en suivant strictement ces instructions :
            ${inst}
            
            HISTORIQUE : ${hist}
            DEMANDE CLIENT : ${dem}
            
            Format de réponse attendu (utilise exactement ce séparateur) :
            [REPONSE]
            (Ton texte d'e-mail ici)
            [SEPARATEUR]
            (Ta section BASE ici)`;

            const result = await model.generateContent(prompt);
            const text = result.response.text();
            
            const splitContent = text.split('[SEPARATEUR]');
            const reponseFinie = splitContent[0].replace('[REPONSE]', '').trim();
            const baseFinie = splitContent[1] ? splitContent[1].trim() : "";

            document.getElementById('reponse_client').value = reponseFinie;
            document.getElementById('base_area').value = baseFinie;

        } catch (error) {
            alert("Erreur Gemini : " + error.message);
        } finally {
            btn.innerText = "GÉNÉRER AVEC GEMINI ✨";
            btn.disabled = false;
        }
    };

    window.initSignature = function() {
        const h = new Date().getHours();
        const area = document.getElementById('reponse_client');
        if (h >= 6 && h < 17) {
            area.value = "\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer un excellent après-midi.\n\nCordialement,\n\nSolofonirina";
        } else {
            area.value = "\n\nJe reste à votre disposition pour toute information complémentaire et vous souhaite de passer une excellente soirée.\n\nCordialement,\n\nSolofonirina";
        }
    };

    window.copierTexte = function(id) {
        const val = document.getElementById(id).value;
        navigator.clipboard.writeText(val);
    };

    window.preparerEtCopierHisto = function() {
        const d = document.getElementById('demande').value;
        const r = document.getElementById('reponse_client').value;
        const b = document.getElementById('base_area').value;
        const datePoste = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        const bloc = `${b}\n\n***************************\n\nFait le ${datePoste}\n\nRequête client :\n${d}\n\nRéponse :\n${r}`;
        navigator.clipboard.writeText(bloc);
    };

    window.toutVider = function() {
        if(confirm("Vider le dossier en cours ?")) {
            ['historique', 'demande', 'instructions', 'base_area'].forEach(id => document.getElementById(id).value = "");
            initSignature();
        }
    };
</script>

</body>
</html>
